name: smart-support-env
version: 2.0.0
description: >
  A deterministic real-world customer support environment where an agent must
  handle onboarding, authentication recovery, and billing escalation workflows.

entrypoint:
  module: app
  app: app

models:
  observation: models.observation.EnvironmentObservation
  action: models.action.AgentAction
  reward: models.reward.StepReward
  state: models.state.EnvironmentState

endpoints:
  reset: /reset
  step: /step
  state: /state

tasks:
  - name: basic_greeting
    title: New User Welcome
    difficulty: easy
    description: Calm a new user and guide them to the CSV import flow.
  - name: medium_resolution
    title: Password Reset Recovery
    difficulty: medium
    description: Safely resolve an expired password reset workflow.
  - name: advanced_escalation
    title: Duplicate Billing Charge
    difficulty: hard
    description: Collect evidence and escalate a duplicate charge dispute.

runtime:
  max_episode_steps: 5
  target_hardware:
    vcpu: 2
    memory_gb: 8

inference:
  script: inference.py
  env:
    API_BASE_URL: ${API_BASE_URL}
    MODEL_NAME: ${MODEL_NAME}
    HF_TOKEN: ${HF_TOKEN}
